            [build-system]
            requires = ["hatchling"]
            build-backend = "hatchling.build"

            [project]
            name = "essence-ml"
            version = "28.0.0"
            description = "ML tools: EDA, clustering, regression, forecasting, fine-tune"
            readme = "README.md"
            requires-python = ">=3.10"
            license = {text = "Apache-2.0"}
            dependencies = [
                "essence-core",
            ]

[project.optional-dependencies]
ml = [
    "scikit-learn",
    "pandas",
    "numpy",
    "prophet",
]

[project.optional-dependencies]
dl = [
    "torch",
    "transformers",
    "peft",
    "unsloth",
]

            [project.scripts]
            uais = "essence_cli.main:main"

            [tool.hatch.build.targets.wheel]
            packages = ["essence_ml"]
