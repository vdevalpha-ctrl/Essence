        [build-system]
        requires = ["hatchling"]
        build-backend = "hatchling.build"

        [project]
        name = "essence-server"
        version = "28.0.0"
        description = "FastAPI server + web UI + MCP endpoint"
        readme = "README.md"
        requires-python = ">=3.10"
        license = {text = "Apache-2.0"}
        dependencies = [
            "essence-agents",
"essence-memory",
"fastapi",
"uvicorn[standard]",
        ]

        [project.scripts]
        uais = "essence_cli.main:main"

        [tool.hatch.build.targets.wheel]
        packages = ["essence_server"]
