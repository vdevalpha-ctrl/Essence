[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "essence-agents"
version = "28.0.0"
description = "Agent, TaskPipeline, SpecialistAgents, WorkflowEngine"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
dependencies = [
    "essence-core",
]

[project.scripts]
uais = "essence_cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["essence_agents"]
