        [build-system]
        requires = ["hatchling"]
        build-backend = "hatchling.build"

        [project]
        name = "essence-cli"
        version = "28.0.0"
        description = "CLI entry point, doctor, self-update, bench"
        readme = "README.md"
        requires-python = ">=3.10"
        license = {text = "Apache-2.0"}
        dependencies = [
            "essence-core",
"essence-agents",
"essence-channels",
        ]

        [project.scripts]
        uais = "essence_cli.main:main"

        [tool.hatch.build.targets.wheel]
        packages = ["essence_cli"]
