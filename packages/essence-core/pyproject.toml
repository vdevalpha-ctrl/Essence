[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "essence-core"
version = "28.0.0"
description = "Hardware detection, model registry, backend adapters"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
dependencies = [
    "pydantic>=2.0",
]

[project.scripts]
uais = "essence_cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["essence_core"]
